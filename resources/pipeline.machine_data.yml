# Pipeline for loading machine data using autoloader

resources:
  pipelines:
    pipeline_machine_data:
      name: pipeline_machine_data
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      # The root path is useful during development in pipeline editor (but dependencies is preferred)
      root_path: "../src"

      libraries:
        - glob:
            include: ../src/dab_pipelines_etl/machine_data/**

      configuration:
        bronze_schema: ${resources.schemas.schema_bronze.name}
        silver_schema: ${resources.schemas.schema_silver.name}
        gold_schema: ${resources.schemas.schema_gold.name}
        machine_uploads_base: "/Volumes/${var.catalog}/${resources.schemas.schema_landing.name}/${resources.volumes.landing_machine_uploads.name}"
        autoloader_metadata_base: "/Volumes/${var.catalog}/${resources.schemas.schema_landing.name}/${resources.volumes.landing_metadata.name}"

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
