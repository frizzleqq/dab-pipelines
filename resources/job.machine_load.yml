# Data generator job for synthetic machine data

resources:
  jobs:
    machine_load:
      name: machine_load

      parameters:
        - name: schema
          default: ${resources.schemas.schema_landing.name}
        - name: volume
          default: ${resources.volumes.landing_machine_uploads.name}
        - name: log_subdir
          default: data_generator
        - name: num_machines
          default: "10"
        - name: num_readings
          default: "1000"
        - name: seed
          default: "42"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              # Include the wheel file and dependencies
              - ../dist/*.whl

      tasks:
        - task_key: generate_synthetic_data
          environment_key: default
          python_wheel_task:
            package_name: dab_pipelines
            entry_point: main
            parameters:
              - "--log-subdir"
              - "{{job.parameters.log_subdir}}"
              - "generate-data"
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "{{job.parameters.schema}}"
              - "--volume"
              - "{{job.parameters.volume}}"
              - "--num-machines"
              - "{{job.parameters.num_machines}}"
              - "--num-readings"
              - "{{job.parameters.num_readings}}"
              - "--seed"
              - "{{job.parameters.seed}}"
        - task_key: pipeline_machine_data
          depends_on:
            - task_key: generate_synthetic_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_machine_data.id}
