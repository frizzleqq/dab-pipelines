# AI/BI dashboard for machine sensor monitoring.
# Reads from the gold layer; catalog and schema are injected per environment
# via dataset_catalog / dataset_schema so the JSON file stays environment-agnostic.

resources:
  dashboards:
    machine_monitoring:
      display_name: "Machine Monitoring Dashboard"
      file_path: ../src/dashboards/machine_monitoring.lvdash.json
      warehouse_id: ${var.warehouse_id}
      dataset_catalog: ${var.catalog}
      dataset_schema: ${resources.schemas.schema_gold.name}
